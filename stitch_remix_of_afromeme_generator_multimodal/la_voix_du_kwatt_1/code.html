<script>
        const micButton = document.getElementById('mic-button');
        const micIcon = document.getElementById('mic-icon');
        const visualFeedback = document.getElementById('visual-feedback');
        const timerDisplay = document.getElementById('timer-display');
        const capturedZone = document.getElementById('captured-zone');
        const footerActions = document.getElementById('footer-actions');
        const hintText = document.getElementById('hint-text');
        const trashButton = document.getElementById('trash-button');

        let isRecording = false;
        let timerInterval;
        let seconds = 0;

        function updateTimer() {
            seconds++;
            const mins = Math.floor(seconds / 60).toString().padStart(2, '0');
            const secs = (seconds % 60).toString().padStart(2, '0');
            timerDisplay.innerText = `${mins}:${secs}`;
        }

        micButton.addEventListener('click', () => {
            if (!isRecording) {
                // Start Recording
                isRecording = true;
                micIcon.innerText = 'stop';
                micIcon.classList.add('text-on-primary');
                micButton.classList.replace('bg-secondary', 'bg-primary');
                visualFeedback.classList.remove('hidden');
                
                seconds = 0;
                timerDisplay.innerText = '00:00';
                timerInterval = setInterval(updateTimer, 1000);
                
                capturedZone.classList.add('hidden');
                footerActions.classList.add('hidden');
                hintText.classList.remove('opacity-0');
            } else {
                // Stop Recording
                isRecording = false;
                micIcon.innerText = 'mic';
                micButton.classList.replace('bg-primary', 'bg-secondary');
                visualFeedback.classList.add('hidden');
                clearInterval(timerInterval);

                // Show Captured State
                capturedZone.classList.remove('hidden');
                footerActions.classList.remove('hidden');
                hintText.classList.add('opacity-0');
            }
        });

        trashButton.addEventListener('click', () => {
            capturedZone.classList.add('hidden');
            footerActions.classList.add('hidden');
            hintText.classList.remove('opacity-0');
            timerDisplay.innerText = '00:00';
            seconds = 0;
        });
    </script>
